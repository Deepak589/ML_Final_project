# Data pipeline config. Single source of truth for paths + subset params.
paths:
  raw: data/raw                 # layer1.json, layer2.json, det_ingrs.json, images/
  processed: data/processed     # generated index + caches (gitignored)
  layer1: data/raw/layer1.json
  layer2: data/raw/layer2.json
  det_ingrs: data/raw/det_ingrs.json
  images: data/raw/images

subset:
  n_recipes: 2000               # smoke value; bump to 50000 for real run
  require_image: true           # keep only recipes with >=1 local image
  seed: 42

splits:
  use_partition_field: true     # use Recipe1M layer1 'partition' (no id leak)

text:
  ingr_max_tokens: 24
  instr_max_tokens: 128
  tokenizer: distilbert-base-uncased

image:
  clip_model: ViT-B-32
  clip_pretrained: openai
  feat_dim: 512

semantic:
  enabled: true                 # coarse title-keyword category labels
  n_categories: 20              # coarse buckets (v1 simplification)
