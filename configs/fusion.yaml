# Ingredient-aware attention fusion config (the project contribution).
# Inherits baseline; overrides fusion mode + exp name.
defaults:
  data: data.yaml

exp_name: fusion_attention
seed: 42
device: auto

model:
  embed_dim: 1024
  image:
    in_dim: 512
    proj_hidden: 1024
  text:
    encoder: distilbert-base-uncased
    hidden: 768
    freeze_text: false
    share_encoder: true
  fusion:
    mode: attention             # cross-attn: instruction queries attend over ingredients
    hidden: 1024
    n_heads: 8
    pool: attention             # perm-robust ingredient pooling
  semantic:
    enabled: true
    n_categories: 20

loss:
  name: infonce
  temperature: 0.07
  lambda_sem: 0.1
  triplet_margin: 0.3

train:
  epochs: 30
  batch_size: 64
  lr: 1.0e-4
  weight_decay: 0.01
  grad_accum: 1
  amp: true
  early_stop_patience: 5
  num_workers: 4

eval:
  subsets: [1k, 10k]
  directions: both
  n_folds: 10
  seed: 1234

log:
  backend: tensorboard
  dir: runs
